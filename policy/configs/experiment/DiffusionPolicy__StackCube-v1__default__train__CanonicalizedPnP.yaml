# @package _global_
defaults:
  - override /algorithm: diffusion_policy
  - override /datamodule: canonical_trajectory_datamodule
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}ExtendedMLPStateEmbedder

algorithm:
  act_horizon: 8

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 256
  load_count: 500

trainer:
  max_steps: 250000
  callbacks:
    early_stopping: null
    rollout_evaluation:
      max_episode_steps: 200 # WARN: HIGHLY IMPORTANT!!!
      clamp_action: true
