# @package _global_
defaults:
  - StackCube-v1_neuromotor

name: StackCube-v1_statepermuted_run
ckpt_path: ???

trainer:
  limit_train_batches: 0
  limit_val_batches: 0
  callbacks:
    rollout_evaluation:
      adapter:
        _target_: policy.utils.adapters.StackCubeObservationPermuter
        swap_env_indices: [0] # e.g., if num_envs=2, env 0 is swapped, env 1 is standard
      num_val_episodes: 0
      num_test_episodes: 2
      num_envs: 2
      video_dir: "${hydra:runtime.output_dir}/renderings/"

      env_id: "StackCube-v1"
      obs_mode: null
      control_mode: null
      physx_backend: null
      use_physx_env_states: null
