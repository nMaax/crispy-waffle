# @package _global_
defaults:
  - StackCube-v1_neuromotor # Inherit everything from the base experiment

name: StackCube-v1_statepermuted_run # The name of the experiment (for logging)
ckpt_path: ???

trainer:
  limit_train_batches: 0
  limit_val_batches: 0 # Disable validation
  callbacks:
    rollout_evaluation:
      permuter:
        _target_: policy.utils.permuters.StackCubeObservationPermuter
        swap_env_indices: [1] # e.g., if num_envs=2, env 0 is standard, env 1 is swapped
      num_val_episodes: 0 # No validation rollouts
      num_test_episodes: 2 # How many you want to evaluate
      num_envs: 2 # Run parallel envs for side-by-side comparison
      video_dir: "${hydra:runtime.output_dir}/renderings/${name}/" # Force rendering

      env_id: "StackCube-v1"
      obs_mode: null
      control_mode: null
      physx_backend: null
      use_physx_env_states: null
