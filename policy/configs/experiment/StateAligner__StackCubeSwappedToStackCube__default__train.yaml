# @package _global_
defaults:
  - override /algorithm: state_aligner
  - override /datamodule: aligned_states_datamodule_stack_cube_swapped_to_stack_cube
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  l1_lambda: 1e-4
  network:
    input_dim: 48
    output_dim: 48

trainer:
  max_steps: 25000
  val_check_interval: 500

  callbacks:
    model_checkpoint:
      _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: "val/loss"
      mode: "min"

    rollout_evaluation: null

    early_stopping:
      patience: 3
