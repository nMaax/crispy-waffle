# @package _global_
defaults:
  - override /algorithm: diffusion
  - override /datamodule: maniskill_datamodule
  - override /algorithm/optimizer: custom_AdamW
  - override /algorithm/lr_scheduler: CosineAnnealingLR
  - override /trainer: default # Redundant since the primary config.yaml already does it, but just for completeness
  - _self_

# The name of the experiment (for logging)
name: StackCube-v1_neuromotor_run

# --- OVERRIDEs  ---

algorithm:
  act_horizon: 8 # Must be smaller than datamodule pred_horizon!
  predict_noise: true # Whether to predict noise or the sample itself

  optimizer:
    lr: 1e-3

  lr_scheduler:
    T_max: ${trainer.max_steps} # TODO: Not so sure about this

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.h5 # Maybe move this to experiments? But only once you truly need it
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 256
  conditioning_source: "env_states"

trainer:
  limit_val_batches: null # Re-enable validation
  limit_test_batches: null # Re-enable testing
  val_check_interval: 5000 # Run the rollout callback every 5000 steps
