# @package _global_
defaults:
  - override /algorithm: diffusion
  - override /datamodule: maniskill_datamodule
  - override /algorithm/optimizer: custom_AdamW
  - override /algorithm/lr_scheduler: CosineAnnealingLR
  - override /trainer: default # Redundant since the primary config.yaml already does it, but just for completeness
  - _self_

name: StackCube-v1_neuromotor_run # The name of the experiment (for logging)
cond_source: "env_states" # Where to evaluate? obs or env_states?

# --- OVERRIDEs  ---

algorithm:
  act_horizon: 8 # Must be smaller than datamodule pred_horizon!
  prediction_type: "epsilon" # Whether to predict noise or the sample itself

  optimizer:
    lr: 1e-3

  lr_scheduler:
    T_max: ${trainer.max_steps}

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.h5 # Maybe move this to experiments? But only once you truly need it
  cond_horizon: 2
  pred_horizon: 16
  batch_size: 256
  conditioning_source: ${cond_source}

trainer:
  limit_val_batches: null # Re-enable validation
  limit_test_batches: null # Re-enable testing
  val_check_interval: 5000 # Run the rollout callback every 5000 steps

  callbacks:
    rollout_evaluation:
      _target_: policy.algorithms.callbacks.rollout_evaluation.RolloutEvaluationCallback
      env_id: StackCube-v1
      num_val_episodes: 10
      num_test_episodes: 100
      conditioning_source: ${cond_source} # Dynamically grab the setting from the datamodule so they never mismatch!
