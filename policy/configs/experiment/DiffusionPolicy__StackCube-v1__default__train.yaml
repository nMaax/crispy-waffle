# @package _global_
defaults:
  - override /algorithm: diffusion
  - override /datamodule: maniskill_datamodule
  - override /trainer: default

name: DiffusionPolicy__StackCube-v1__default__train

algorithm:
  act_horizon: 8

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 256

trainer:
  callbacks:
    rollout_evaluation:
      max_episode_steps: 200 # WARN: HIGHLY IMPORTANT!!!
      clamp_action: true
