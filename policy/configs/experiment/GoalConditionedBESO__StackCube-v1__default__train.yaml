# @package _global_
defaults:
  - override /algorithm: beso_policy
  - override /datamodule: goal_conditioned_trajectory_datamodule
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  act_horizon: 1
  goal_seq_len: 1

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  obs_horizon: 5
  pred_horizon: 5
  batch_size: 256
  load_count: 500
  her_ratio: 0.8

trainer:
  max_steps: 250000
  callbacks:
    early_stopping: null
    rollout_evaluation:
      num_inference_timesteps: 3
      max_episode_steps: 200
      clamp_action: true
