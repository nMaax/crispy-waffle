# @package _global_
defaults:
  - DiffusionPolicy__StackCube-v1__default__train

name: ${hydra:runtime.choices.experiment}

algorithm:
  optimizer:
    lr: 1e-5

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/PlaceSphereWristcam-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  load_count: 5

trainer:
  max_steps: 5000
  callbacks:
    rollout_evaluation:
      env_id: PlaceSphere-v1
      robot_uids: panda_wristcam
      max_episode_steps: 200
