# @package _global_
defaults:
  - override /algorithm: linear_adapter
  - override /datamodule: adapter_datamodule_stack_cube_swapped
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  network:
    input_dim: 48
    output_dim: 48

trainer:
  max_steps: 25000
  val_check_interval: 500

  callbacks:
    model_checkpoint:
      monitor: "val/loss"
      mode: "min"

    rollout_evaluation: null

    early_stopping:
      patience: 3 # "Stop training if the monitored metric doesn't improve after 10 consecutive validation checks"
