# @package _global_
defaults:
  - override /algorithm: multi_task_state_aligner
  - override /datamodule: multi_task_aligned_states_datamodule
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  l1_lambda: 1e-4
  network:
    input_dim: 39
    output_dim: 48

trainer:
  max_steps: 25000
  val_check_interval: 500

  callbacks:
    model_checkpoint:
      monitor: "val/loss"
      mode: "min"

    rollout_evaluation: null

    early_stopping:
      patience: 3
