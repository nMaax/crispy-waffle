# @package _global_
defaults:
  - override /algorithm: multi_task_state_aligner
  - override /datamodule: multi_task_aligned_states_datamodule
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  network:
    input_dim: 39 # proprio + tcp pose + A pose + B pose
    output_dim: 48
    num_tasks: 2 # TODO: should be fetched from the datamodule?

trainer:
  max_steps: 25000
  val_check_interval: 500

  callbacks:
    model_checkpoint:
      monitor: "val/loss"
      mode: "min"

    rollout_evaluation: null

    early_stopping:
      patience: 3 # "Stop training if the monitored metric doesn't improve after 10 consecutive validation checks"
