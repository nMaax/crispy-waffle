# @package _global_
defaults:
  - override /algorithm: beso_policy
  - override /datamodule: canonical_trajectory_datamodule
  - override /trainer: default

name: ${hydra:runtime.choices.experiment}

algorithm:
  act_horizon: 1

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  obs_horizon: 5 # 4 or 5
  pred_horizon: 5 # 4 or 5
  batch_size: 1024
  load_count: 500

trainer:
  max_steps: 250000 # 40k to 60k
  callbacks:
    early_stopping: null
    rollout_evaluation:
      num_inference_steps: 3
      max_episode_steps: 200 # WARN: HIGHLY IMPORTANT!!!
      clamp_action: true
