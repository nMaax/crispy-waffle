# @package _global_

defaults:
  - GoalConditionedDiffusionPolicy__StackCube-v1__default__train__MLP__emb_128

finetuning_ckpt_path: ???

datamodule:
  dataset_file: ${oc.env:HOME}/.maniskill/demos/PlaceCubeLeft-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5
  load_count: 100

trainer:
  max_steps: 20000
  callbacks:
    differential_lr:
      _target_: policy.algorithms.callbacks.differential_lr.DifferentialLRCallback
      unet_lr: 1e-5

algorithm:
  lr_scheduler:
    num_warmup_steps: 500
    num_training_steps: ${trainer.max_steps}
