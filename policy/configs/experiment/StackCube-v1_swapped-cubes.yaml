# @package _global_
defaults:
  - StackCube-v1_neuromotor

name: StackCube-v1_swapped-cubes_run
ckpt_path: ???

trainer:
  callbacks:
    rollout_evaluation:
      adapter:
        _target_: policy.utils.adapters.StackCubeObservationPermuter
        swap_env_indices: [0] # e.g., if num_envs=2, env 0 is swapped, env 1 is standard
      num_episodes: 2
      num_envs: 2
      video_dir: "${hydra:runtime.output_dir}/renderings/"

      env_id: "StackCube-v1"
      obs_mode: "state"
      control_mode: "pd_ee_delta_pos"
      physx_backend: null
