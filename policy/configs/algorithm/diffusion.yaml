_target_: policy.algorithms.diffusion.DiffusionPolicy
obs_horizon: ${datamodule.obs_horizon}
pred_horizon: ${datamodule.pred_horizon}
act_horizon: 8
action_dim: 8 # Franka Panda
obs_dim: 13 # Stack Cube
num_diffusion_iters: 100
lr: 1e-4

network:
  _target_: policy.algorithms.networks.unet1d.ConditionalUnet1D
  input_dim: ${..action_dim}
  global_cond_dim: ${eval:'${..obs_horizon} * ${..obs_dim}'}
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  n_groups: 8
