defaults:
  - network: unet1d

_target_: policy.algorithms.diffusion.DiffusionPolicy
obs_horizon: ${datamodule.obs_horizon}
pred_horizon: ${datamodule.pred_horizon}
act_horizon: 8
action_dim: 8
obs_dim: 13
num_diffusion_iters: 100
lr: 1e-4,
warmup_steps: 500

network:
  # Overriding the ??? in unet1d config file
  input_dim: ${algorithm.action_dim}
  global_cond_dim: ${eval:'${algorithm.obs_horizon} * ${algorithm.obs_dim}'}
