defaults:
  - noise_scheduler: edm
  - ema: default
  - optimizer: AdamW
  - lr_scheduler: cosine_with_warmup

_target_: policy.algorithms.beso_policy.BesoPolicy
_recursive_: false

obs_horizon: ${datamodule.obs_horizon}
pred_horizon: ${datamodule.pred_horizon}
act_horizon: ??

obs_dim: ${datamodule.obs_dim}
act_dim: ${datamodule.act_dim}

sigma_data: ${algorithm.noise_scheduler.sigma_data}
sigma_mean: -1.2
sigma_std: 1.2
sigma_churn: 1.0 # Adds Langevin stochasticity during sampling, 0.0 means ODE, >0.0 mean SDE

network:
  _target_: policy.algorithms.networks.diffusion_gpt.DiffusionGPT
  obs_dim: ${..obs_dim}
  act_dim: ${..act_dim}
  embed_dim: 256
  n_layers: 4
  n_heads: 8
  obs_horizon: ${..obs_horizon}
  pred_horizon: ${..pred_horizon}

optimizer:
  lr: 1e-4
  weight_decay: 1e-5
  betas: [0.9, 0.95]

lr_scheduler:
  num_training_steps: ${trainer.max_steps}
