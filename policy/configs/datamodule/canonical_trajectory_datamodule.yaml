_target_: policy.datamodules.trajectory_datamodule.TrajectoryDataModule
dataset_file: ${oc.env:HOME}/.maniskill/demos/StackCube-v1/motionplanning/trajectory.state.pd_ee_delta_pos.physx_cuda.h5

obs_horizon: 2
pred_horizon: 16

obs_dim: 39 # Canonical PnP dimensionality: Proprio (18) + TCP Pose (7) + A Pose (7) + B Pose (7)
act_dim: 4

batch_size: 256
num_workers: 4

val_split: 0.1
lazy: false
seed: ${seed} # Seed is passed by config.py
canonicalize: true
