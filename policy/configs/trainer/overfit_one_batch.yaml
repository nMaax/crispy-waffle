defaults:
  - default
  - override callbacks: no_checkpoints

# NOTE: This configuration should be run in combination with an algorithm. For example like this:
# `python policy/main.py algorithm=example datamodule=cifar10 trainer=overfit_one_batch`

callbacks:
  model_checkpoint: null
  early_stopping: null

max_steps: 5000
fast_dev_run: false
overfit_batches: 1
limit_val_batches: 0
limit_test_batches: 0
detect_anomaly: true
enable_checkpointing: false
profiler: null
log_every_n_steps: 1
