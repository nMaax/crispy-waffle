rollout_evaluation:
  _target_: policy.algorithms.callbacks.rollout_evaluation.RolloutEvaluationCallback
  _recursive_: false
  adapter: null
  num_val_episodes: 25
  num_test_episodes: 100
  max_episode_steps: 200
  num_envs: null # =1: CPU backend, >1: GPU backend, null: auto, i.e., min(num_val_episodes, num_test_episodes)
  ignore_terminations: true
  clamp_action: false
  video_dir: null
  seed: ${seed} # Seed is passed by config.py

  # Fetch everything from the dataset automatically
  env_id: null
  obs_mode: null
  control_mode: null
  physx_backend: null
  use_physx_env_states: null
