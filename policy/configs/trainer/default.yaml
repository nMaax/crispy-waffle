defaults:
  - callbacks: default.yaml
  - logger: null # use trainer/logger=wandb to enable wandb logging.

_target_: lightning.Trainer
accelerator: auto
strategy: auto
devices: 1

deterministic: false

fast_dev_run: false

min_epochs: -1 # -1 disables epoch limits
max_epochs: -1 # -1 disables epoch limits
max_steps: 100000 # Train for exactly 100,000 iterations (batches)
log_every_n_steps: 50 # Log progress (e.g. wandb) every 50 batches

num_sanity_val_steps: 2 # Set to 0 to avoid sanity check, tho this should not be done...

limit_val_batches: 0 # Tells experiment.py to skip validation
limit_test_batches: 0 # Tells experiment.py to skip testing

val_check_interval: 5000 # Run the validation (loss) + rollout callback (success_rate) every 5000 steps
check_val_every_n_epoch: null # Tell Lightning to ignore epoch boundaries for validation frequency

# path to output directory, created dynamically by hydra
# path generation pattern is specified in `configs/hydra/default.yaml`
# use it to store all files generated during the run, like checkpoints and metrics
default_root_dir: ${hydra:runtime.output_dir}

detect_anomaly: false
